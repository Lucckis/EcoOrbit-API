services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecoorbit_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecoorbit_net
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: ecoorbit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-ecoorbit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ecoorbit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecoorbit_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ecoorbit} -d ecoorbit_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
    name: ecoorbit_rabbitmq_data
  postgres_data:
    name: ecoorbit_postgres_data
networks:
  ecoorbit_net:
    name: ecoorbit_network
    driver: bridge