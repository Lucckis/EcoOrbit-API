api_server:
  build: ./ecoorbit_api_server
  container_name: ecoorbit_api_server
  ports:
    - "8761:8761"
  networks:
    - ecoorbit_net

  api_usuario:
    build: ./ecoorbit_api_usuario
    container_name: ecoorbit_api_usuario
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DB_URL: jdbc:postgresql://postgres:5432/ecoorbit_db
      DB_USERNAME: ${DB_USERNAME:-ecoorbit}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - ecoorbit_net

  api_ia:
    build: ./ecoorbit_api_ia
    container_name: ecoorbit_api_ia
    ports:
      - "8082:8082"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - api_server
    networks:
      - ecoorbit_net

  api_predict:
    build: ./ecoorbit_api_predict
    container_name: ecoorbit_api_predict
    ports:
      - "8083:8083"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      API_FLASK: ${API_FLASK}
    depends_on:
      - api_server
    networks:
      - ecoorbit_net